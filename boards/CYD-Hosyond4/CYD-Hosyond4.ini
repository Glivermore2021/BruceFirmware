; CYD-Hosyond4 — 4.0" Hosyond ESP32-32E Cheap Yellow Display
;
; Hardware:
;   Amazon ASIN B0FGJJ24S1 | LCDwiki: 4.0inch_ESP32-32E_Display
;   MCU:     ESP32-D0WD-V3 (ESP32-WROOM-32E class)
;   Display: ST7796S, 320x480, HSPI bus
;   Touch:   XPT2046 resistive, shares HSPI with display
;
; Electrical interface is identical to CYD-3248S035R (3.5" E32R35T) —
; this env extends the same CYD35_base template. The only physical
; difference is screen size (4.0" vs 3.5"), which affects touch
; calibration offsets only (handled at runtime, stored in LittleFS).
;
; References:
;   - wilson3682/CYD-4.0-320x480-Touch-Screen (proven TFT_eSPI User_Setup)
;   - HaleHound-CYD Issue #56 (board pinout + LovyanGFX calibration)
;   - Bruce Firmware Issues #1741 and #2045 (related 4"/3.5" HSPI work)

[env:CYD-Hosyond4]
extends = CYD35_base
build_flags =
	${CYD35_base.build_flags}
	-DST7796_DRIVER=1
	-DTFT_BL=27
	-DTOUCH_OFFSET_ROTATION=1
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DTOUCH_CS=33
	-DUSE_TFT_eSPI_TOUCH
	-DTOUCH_CONFIG_INT_GPIO_NUM=36
	-DDEVICE_NAME='"CYD-Hosyond4"'

[env:LAUNCHER_CYD-Hosyond4]
extends = env:CYD-Hosyond4
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:CYD-Hosyond4.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}
